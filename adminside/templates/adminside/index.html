<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>BO&MIE Admin</title>
    <style>
      body {
        font-family: Arial;
        margin: 0;
        background: #f0f1f4;
      }
      .layout {
        display: flex;
      }
      .side {
        width: 220px;
        background: #fff;
        min-height: 100vh;
        padding: 20px;
      }
      .content {
        flex: 1;
        padding: 20px;
      }
      .card {
        background: #fff;
        border: 1px solid #ddd;
        border-radius: 10px;
        padding: 16px;
        margin-bottom: 16px;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th,
      td {
        padding: 8px;
        border-bottom: 1px solid #eee;
        text-align: left;
      }
      .badge {
        padding: 4px 8px;
        border-radius: 10px;
        font-size: 12px;
      }
      .available {
        color: green;
      }
      .unavailable {
        color: red;
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <div class="side">
        <h3>BO&MIE</h3>
        <p>Dashboard</p>
        <p>Inventory</p>
        <p>Reports</p>
        <p>Employee Reports</p>
        <p>Orders</p>
        <p>Settings</p>
      </div>
      <div class="content">
        <div class="card">
          <h2 id="title">{{ page|title }}</h2>
          <p>Integrated demo screen powered by API.</p>
        </div>
        <div class="card">
          <h3>Dashboard Metrics</h3>
          <pre id="metrics">Loading...</pre>
        </div>
        <div class="card">
          <h3>Products</h3>
          <table id="products">
            <thead>
              <tr>
                <th>Name</th>
                <th>Code</th>
                <th>Qty</th>
                <th>Price</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </div>
    <script>
      async function load() {
        const m = await fetch("/api/v1/admin/dashboard/metrics/")
          .then((r) => r.json())
          .catch(() => ({ detail: "Auth token required for protected API" }));
        document.getElementById("metrics").innerText = JSON.stringify(
          m,
          null,
          2,
        );
        const p = await fetch("/api/v1/admin/manage-roles/products/")
          .then((r) => r.json())
          .catch(() => ({ results: [] }));
        const rows = (p.results || p)
          .map(
            (x) =>
              `<tr><td>${x.name || ""}</td><td>${x.product_id || ""}</td><td>${x.quantity || ""}</td><td>${x.buying_price || ""}</td><td>${x.stock_status || ""}</td></tr>`,
          )
          .join("");
        document.querySelector("#products tbody").innerHTML = rows;
      }
      load();
    </script>
  </body>
</html>

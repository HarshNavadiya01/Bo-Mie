{% extends 'adminside/layout/base.html' %}
{% load static %}

{% block title %}
Dashboard
{% endblock %}

{% block content %}

<div class="page-header">
    <h4>Sales Overview</h4>
</div>

<div class="row g-3">

    <div class="col-md-3">
        <div class="stat-card">
            <h3 id="sales">0</h3>
            <span>Sales</span>
        </div>
    </div>

    <div class="col-md-3">
        <div class="stat-card">
            <h3 id="revenue">0</h3>
            <span>Revenue</span>
        </div>
    </div>

    <div class="col-md-3">
        <div class="stat-card">
            <h3 id="orders">0</h3>
            <span>Orders</span>
        </div>
    </div>

    <div class="col-md-3">
        <div class="stat-card">
            <h3 id="cancelled">0</h3>
            <span>Cancelled</span>
        </div>
    </div>

</div>

<div class="card mt-4">

    <div class="card-body">

        <h5>Dashboard Metrics</h5>

<pre id="metrics" aria-live="polite">Loading...</pre>

    </div>

</div>

{% endblock %}

{% block js %}
<script src="{% static 'adminside/js/dashboard.js' %}"></script>
{% endblock %}

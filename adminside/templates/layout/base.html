{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}BO&MIE Admin{% endblock %}</title>
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=Playfair+Display:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{% static 'adminside/css/style.css' %}" />
    {% block css %}{% endblock %}
  </head>
  <body>
    <div class="admin-wrapper">
      {% include 'layout/sidebar.html' %}
      <div class="main-content">
        {% include 'layout/navbar.html' %}
        <div class="content-area">{% block content %}{% endblock %}</div>
      </div>
    </div>

    <div id="toast-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
    <script>
      // ===== AUTH GUARD =====
      (function () {
        const access = localStorage.getItem("admin_access");
        const refresh = localStorage.getItem("admin_refresh");
        if (!access && !refresh) {
          window.location.replace("/api/v1/admin/login/");
        }
      })();

      // ===== GLOBAL HELPERS =====
      const API_BASE = "/api/v1/admin";
      let _access = localStorage.getItem("admin_access") || "";
      let _refresh = localStorage.getItem("admin_refresh") || "";

      async function apiFetch(path, opts = {}) {
        if (!_access) {
          window.location.href = "/api/v1/admin/login/";
          return;
        }
        let res = await fetch(API_BASE + path, {
          ...opts,
          headers: {
            "Content-Type": "application/json",
            Authorization: "Bearer " + _access,
            ...(opts.headers || {}),
          },
        });
        if (res.status === 401 && _refresh) {
          const r2 = await fetch(API_BASE + "/auth/refresh/", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Authorization: "Bearer " + _refresh,
            },
          });
          if (r2.ok) {
            const d = await r2.json();
            _access = d.access;
            _refresh = d.refresh || _refresh;
            localStorage.setItem("admin_access", _access);
            if (d.refresh) localStorage.setItem("admin_refresh", d.refresh);
            return apiFetch(path, opts);
          } else {
            doLogout();
            return;
          }
        }
        return res;
      }

      async function apiGet(path) {
        const r = await apiFetch(path);
        if (!r) return null;
        if (!r.ok) return null;
        return r.json();
      }

      async function apiPost(path, body) {
        const r = await apiFetch(path, {
          method: "POST",
          body: JSON.stringify(body),
        });
        if (!r) return null;
        return r;
      }
      async function apiPatch(path, body) {
        const r = await apiFetch(path, {
          method: "PATCH",
          body: JSON.stringify(body),
        });
        if (!r) return null;
        return r;
      }
      async function apiDelete(path) {
        const r = await apiFetch(path, { method: "DELETE" });
        if (!r) return null;
        return r;
      }

      async function apiForm(path, form, method = "POST") {
        if (!_access) {
          window.location.href = "/api/v1/admin/login/";
          return null;
        }
        let res = await fetch(API_BASE + path, {
          method,
          headers: { Authorization: "Bearer " + _access },
          body: form,
        });
        if (res.status === 401 && _refresh) {
          const r2 = await fetch(API_BASE + "/auth/refresh/", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Authorization: "Bearer " + _refresh,
            },
          });
          if (r2.ok) {
            const d = await r2.json();
            _access = d.access;
            _refresh = d.refresh || _refresh;
            localStorage.setItem("admin_access", _access);
            if (d.refresh) localStorage.setItem("admin_refresh", d.refresh);
            return apiForm(path, form, method);
          }
          doLogout();
          return null;
        }
        return res;
      }

      function toast(msg, type = "info") {
        const el = document.createElement("div");
        el.className = "toast " + type;
        el.innerHTML = `<i class="bi bi-${type === "success" ? "check-circle" : type === "error" ? "x-circle" : "info-circle"}"></i> ${msg}`;
        document.getElementById("toast-container").appendChild(el);
        setTimeout(() => el.remove(), 3500);
      }

      function fmtMoney(v) {
        return (
          "$" +
          parseFloat(v || 0)
            .toFixed(2)
            .replace(/\B(?=(\d{3})+(?!\d))/g, ",")
        );
      }
      function fmtNum(v) {
        return parseInt(v || 0).toLocaleString();
      }

      function openModal(id) {
        document.getElementById(id).classList.add("open");
      }
      function closeModal(id) {
        document.getElementById(id).classList.remove("open");
      }
      document
        .querySelectorAll(".modal-close,[data-dismiss]")
        .forEach((b) =>
          b.addEventListener("click", () =>
            closeModal(b.closest(".modal-overlay").id),
          ),
        );
      document.querySelectorAll(".modal-overlay").forEach((o) =>
        o.addEventListener("click", (e) => {
          if (e.target === o) o.classList.remove("open");
        }),
      );

      function doLogout() {
        localStorage.removeItem("admin_access");
        localStorage.removeItem("admin_refresh");
        window.location.href = "/api/v1/admin/login/";
      }

      // Set active nav
      (function () {
        const p = window.location.pathname;
        document.querySelectorAll(".nav-item[data-page]").forEach((el) => {
          if (p.includes(el.dataset.page)) el.classList.add("active");
        });
      })();
    </script>
    {% block js %}{% endblock %}
  </body>
</html>

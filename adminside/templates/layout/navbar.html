<div class="topbar">
  <div style="display:flex;align-items:center;gap:14px">
    <button class="icon-btn" id="menuToggle" style="display:none" onclick="document.getElementById('sidebar').classList.toggle('open')">
      <i class="bi bi-list"></i>
    </button>
    <span class="page-title" id="topbar-title">Dashboard</span>
  </div>
  <div class="search-box">
    <i class="bi bi-search"></i>
    <input type="text" placeholder="Search product, supplier, order" id="global-search"/>
  </div>
  <div class="topbar-right">
    <button class="icon-btn" title="Notifications">
      <i class="bi bi-bell"></i>
      <span class="notif-dot"></span>
    </button>
    <img src="https://ui-avatars.com/api/?name=Admin&background=343434&color=fff&size=80" class="topbar-avatar" id="topbar-avatar" alt="Profile"/>
  </div>
</div>
<script>
(function(){
  const t = document.getElementById('topbar-title');
  const p = window.location.pathname;
  const map = {dashboard:'Dashboard',inventory:'Inventory',reports:'Reports',employees:'Employee Reports',orders:'Orders',settings:'Settings'};
  for(const [k,v] of Object.entries(map)){ if(p.includes(k)){ t.textContent=v; break; } }
  // Load admin info
  const info = JSON.parse(localStorage.getItem('admin_info')||'{}');
  if(info.name) document.getElementById('topbar-avatar').src = 'https://ui-avatars.com/api/?name='+encodeURIComponent(info.name)+'&background=343434&color=fff&size=80';
  // Mobile toggle
  if(window.innerWidth<=768) document.getElementById('menuToggle').style.display='flex';
})();
</script>

<script>
function confirmLogout() {
  if(confirm('Are you sure you want to log out?')) {
    const ref = localStorage.getItem('admin_refresh');
    if(ref) {
      fetch('/api/v1/admin/auth/logout/', {method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+ref}});
    }
    doLogout();
  }
}
</script>

{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin Login</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'adminside/css/style.css' %}">

  <style>
    body { background:#f6f7fb; }
    .login-wrap {
      max-width: 460px;
      margin: 80px auto;
      padding: 24px;
      background:#fff;
      border-radius: 12px;
      box-shadow: 0 8px 30px rgba(0,0,0,.06);
    }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="mb-3">
      <h4 class="mb-0">BO&amp;MIE Admin Login</h4>
      <div class="text-muted">Sign in to continue</div>
    </div>

    <form id="loginForm" autocomplete="off">
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input class="form-control" type="email" name="email" required placeholder="admin@example.com" />
      </div>

      <div class="mb-3">
        <label class="form-label">Password</label>
        <input class="form-control" type="password" name="password" required placeholder="••••••••" />
      </div>

      <div class="d-grid mb-2">
        <button class="btn btn-primary" type="submit">Login</button>
      </div>

      <div id="errorBox" class="text-danger" style="min-height: 20px;"></div>
    </form>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const errorBox = document.getElementById('errorBox');

    function setError(msg) {
      errorBox.textContent = msg || '';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      setError('');

      const email = form.email.value.trim();
      const password = form.password.value;

      try {
        const res = await fetch('/api/v1/admin/auth/login/', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json().catch(() => ({}));

        if (!res.ok) {
          setError(data.detail || 'Login failed');
          return;
        }

        // Store JWT (used by API calls)
        localStorage.setItem('admin_access', data.access);
        localStorage.setItem('admin_refresh', data.refresh);

        // Go to admin UI (protected by server)
        window.location.href = '/api/v1/admin/ui/';
      } catch (err) {
        setError('Network error');
      }
    });
  </script>
</body>
</html>

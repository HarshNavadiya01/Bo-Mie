{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Log In — BO&MIE Paris</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <link rel="stylesheet" href="{% static 'adminside/css/style.css' %}"/>
  <style>
    :root{--theme:#FBF8F5;--heading:#343434;--text:#686869;--line:#E8E0D8}
    body{background:var(--theme);min-height:100vh;display:flex;align-items:stretch;font-family:'DM Sans',sans-serif;color:var(--text);position:relative;overflow:hidden}
    body::before{content:'';position:fixed;inset:0;pointer-events:none;opacity:.55;background:
      radial-gradient(42% 34% at 8% 20%, rgba(255,255,255,.96) 0 42%, transparent 43%),
      radial-gradient(38% 30% at 92% 10%, rgba(255,255,255,.92) 0 44%, transparent 45%),
      radial-gradient(36% 30% at 18% 72%, rgba(255,255,255,.9) 0 46%, transparent 47%),
      radial-gradient(44% 36% at 92% 78%, rgba(255,255,255,.94) 0 43%, transparent 44%),
      linear-gradient(90deg, rgba(255,255,255,.35) 0 18%, transparent 18% 62%, rgba(255,255,255,.3) 62% 78%, transparent 78%)}
    .login-left{flex:1;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;padding:56px;z-index:1}
    .pattern-bg{position:absolute;inset:0;background:transparent}
    .pattern-icons{display:none}
    .brand-photo{width:min(560px,86%);aspect-ratio:430/318;border:1px solid var(--line);box-shadow:0 28px 70px rgba(52,52,52,.12);border-radius:2px;position:relative;overflow:hidden;background:linear-gradient(135deg,#fff 0%,#f2ece6 48%,#fff 100%)}
    .brand-photo::before{content:'';position:absolute;inset:0;background:
      radial-gradient(120px 80px at 26% 64%, #d79a57 0 18%, transparent 19%),
      radial-gradient(120px 78px at 18% 69%, #c97938 0 17%, transparent 18%),
      radial-gradient(86px 86px at 63% 26%, #c9894f 0 22%, #f7efe7 23% 29%, transparent 30%),
      linear-gradient(135deg, transparent 0 58%, rgba(255,255,255,.72) 58%),
      repeating-linear-gradient(160deg, rgba(52,52,52,.08) 0 1px, transparent 1px 28px);opacity:.92}
    .brand-photo::after{content:'BO&MIE';position:absolute;right:34px;bottom:28px;border:2px solid var(--heading);background:#fff;color:var(--heading);font-weight:900;letter-spacing:1px;padding:10px 14px;font-size:22px;box-shadow:0 10px 25px rgba(52,52,52,.08)}
    .login-right{width:440px;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 40px;min-height:100vh;z-index:1;box-shadow:-20px 0 60px rgba(52,52,52,.06)}
    .login-logo{border:2px solid var(--heading);padding:9px 20px 7px;text-align:center;margin-bottom:32px;background:#fff;color:var(--heading);min-width:178px}
    .login-logo-main{font-family:'DM Sans',sans-serif;font-size:26px;font-weight:900;letter-spacing:1px;line-height:1;color:var(--heading)}
    .login-logo-sub{font-size:10px;letter-spacing:4px;text-transform:uppercase;margin-top:4px;color:var(--heading);font-weight:800}
    h2{font-family:'DM Sans',sans-serif;font-size:24px;font-weight:800;margin-bottom:4px;text-align:center;color:var(--heading)}
    .sub{font-size:13.5px;color:var(--text);text-align:center;margin-bottom:28px}
    .form-group{width:100%;margin-bottom:16px}
    .form-label{display:block;font-size:12.5px;font-weight:700;color:var(--heading);margin-bottom:6px}
    .form-control{width:100%;padding:10px 13px;border:1.5px solid var(--line);border-radius:8px;font-size:13.5px;font-family:inherit;outline:none;transition:border-color .2s;color:var(--heading);background:#fff}
    .form-control:focus{border-color:var(--heading)}
    .pass-wrap{position:relative}
    .pass-wrap .form-control{padding-right:42px}
    .pass-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);border:none;background:none;cursor:pointer;color:var(--text);font-size:15px}
    .row-between{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;width:100%}
    .check-label{display:flex;align-items:center;gap:7px;font-size:13px;color:var(--text);cursor:pointer}
    .check-label input{accent-color:var(--heading)}
    .forgot{font-size:13px;color:var(--heading);text-decoration:none;font-weight:700}
    .forgot:hover{text-decoration:underline}
    .btn-login{width:100%;padding:12px;background:var(--heading);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit;transition:background .2s;margin-bottom:20px}
    .btn-login:hover{background:#232323}
    .btn-login:disabled{opacity:.6;cursor:not-allowed}
    .divider{display:flex;align-items:center;gap:12px;margin-bottom:18px;width:100%}
    .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--line)}
    .divider span{font-size:12px;color:var(--text);white-space:nowrap}
    .social-btns{display:flex;gap:12px;width:100%;margin-bottom:24px}
    .social-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;padding:10px;border:1.5px solid var(--line);border-radius:8px;cursor:pointer;font-size:13.5px;font-family:inherit;background:#fff;transition:border-color .2s;color:var(--heading);font-weight:700}
    .social-btn:hover{border-color:var(--heading)}
    .signup-link{font-size:13px;color:var(--text);text-align:center}
    .signup-link a{color:var(--heading);font-weight:800;text-decoration:none}
    .signup-link a:hover{text-decoration:underline}
    .error-box{color:#dc2626;font-size:13px;min-height:20px;margin-bottom:12px;text-align:center}
    @media(max-width:900px){.login-left{display:none}.login-right{width:100%;min-height:100vh}}
  </style>
</head>
<body>
  <div class="login-left">
    <div class="pattern-bg"></div>
    <div class="brand-photo" aria-label="BO&MIE croissant and coffee brand photography"></div>
  </div>
  <div class="login-right">
    <div class="login-logo">
      <div class="login-logo-main">BO&amp;MIE</div>
      <div class="login-logo-sub">Paris</div>
    </div>
    <h2>Log in to your account</h2>
    <p class="sub">Welcome back! Please enter your details.</p>

    <div style="width:100%">
      <div class="form-group">
        <label class="form-label">User ID <span style="color:#ef4444">*</span></label>
        <input class="form-control" type="email" id="login-email" placeholder="Enter your user ID"/>
      </div>
      <div class="form-group">
        <label class="form-label">Password <span style="color:#ef4444">*</span></label>
        <div class="pass-wrap">
          <input class="form-control" type="password" id="login-pass" placeholder="Enter your password"/>
          <button class="pass-toggle" onclick="togglePass()" type="button"><i class="bi bi-eye-slash" id="pass-icon"></i></button>
        </div>
      </div>
      <div class="row-between">
        <label class="check-label"><input type="checkbox" id="keep-signed" checked/> Keep me signed in</label>
        <a href="#" class="forgot">Forgot password?</a>
      </div>
      <div class="error-box" id="err-box"></div>
      <button class="btn-login" id="login-btn" onclick="doLogin()">Log In</button>
      <div class="divider"><span>Or sign in with</span></div>
      <div class="social-btns">
        <button class="social-btn" onclick="socialToast('Apple')"><i class="bi bi-apple" style="font-size:18px"></i></button>
        <button class="social-btn" onclick="socialToast('Google')">
          <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z"/></svg>
        </button>
        <button class="social-btn" onclick="socialToast('Facebook')"><i class="bi bi-facebook" style="font-size:18px;color:#1877f2"></i></button>
      </div>
      <div class="signup-link">Don't have an account? <a href="#">Sign Up</a></div>
    </div>
  </div>

  <script>
    function togglePass(){
      const inp=document.getElementById('login-pass');
      const icon=document.getElementById('pass-icon');
      inp.type=inp.type==='password'?'text':'password';
      icon.className=inp.type==='password'?'bi bi-eye-slash':'bi bi-eye';
    }
    function socialToast(name){ alert(name+' sign-in not configured yet.'); }
    function setError(msg){ document.getElementById('err-box').textContent=msg||''; }

    document.addEventListener('keydown',e=>{ if(e.key==='Enter') doLogin(); });

    async function doLogin(){
      const email=document.getElementById('login-email').value.trim();
      const password=document.getElementById('login-pass').value;
      setError('');
      if(!email||!password){setError('Please enter your email and password.');return;}
      const btn=document.getElementById('login-btn');
      btn.disabled=true; btn.textContent='Signing in...';
      try{
        const res=await fetch('/api/v1/admin/auth/login/',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password})});
        const data=await res.json().catch(()=>({}));
        if(!res.ok){setError(data.detail||'Invalid credentials.');btn.disabled=false;btn.textContent='Log In';return;}
        localStorage.setItem('admin_access',data.access);
        localStorage.setItem('admin_refresh',data.refresh);
        if(data.admin) localStorage.setItem('admin_info',JSON.stringify(data.admin));
        window.location.href='/api/v1/admin/ui/dashboard/';
      }catch(err){setError('Network error. Please try again.');btn.disabled=false;btn.textContent='Log In';}
    }
  </script>
</body>
</html>
